apiVersion: v1
kind: Service
metadata:
  name: hello
  labels:
    app: hello
spec:
  selector:
    app: hello
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}

    - name: metrics
      port: 9113
      targetPort: 9113

  type: {{ .Values.service.type }}
